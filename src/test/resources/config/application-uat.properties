# ==============================================================
# OrangeHRM BDD Automation - UAT Environment Configuration
# ==============================================================

# --------------------------------------------------------------
# Application
# --------------------------------------------------------------
base_url=https://opensource-demo.orangehrmlive.com

# --------------------------------------------------------------
# Browser - Core
# --------------------------------------------------------------
# Supported values: chromium | firefox | webkit
browser.type=chromium

# Run browser without UI (true for CI/CD pipelines)
browser.headless=false

# Slow down each action by N milliseconds (useful for debugging/demo)
browser.slow.mo=0

# Optional: absolute path to the browser executable.
# Leave empty to use the browser installed by Playwright (default).
# Example (Windows): browser.executable.path=D:\\plw-chromium\\v144\\chrome.exe
# Example (Linux):   browser.executable.path=/usr/bin/chromium-browser
# browser.executable.path= C:/Users/thunder/AppData/Local/ms-playwright/chrome-win64/145.0.7632.6
browser.executable.path= 
#browser.executable.path= C:\\Users\\thunder\\AppData\\Local\\ms-playwright\\chrome-win64\\145.0.7632.6

# --------------------------------------------------------------
# Browser - Viewport & Display
# --------------------------------------------------------------
browser.viewport.width=1920
browser.viewport.height=1080

# Device scale factor (1 = normal, 2 = HiDPI/Retina)
browser.device.scale.factor=1

# Emulate touch events
browser.has.touch=false

# Force dark or light color scheme: light | dark | no-preference
browser.color.scheme=light

# --------------------------------------------------------------
# Browser - Context & Permissions
# --------------------------------------------------------------
# Accept or deny geolocation, notifications, etc.
# Comma-separated list: geolocation,notifications,camera,microphone
browser.context.permissions=

# Locale and timezone
browser.locale=en-US
browser.timezone.id=Asia/Tehran

# Bypass Content Security Policy
browser.bypass.csp=false

# Ignore HTTPS errors (self-signed certs in test envs)
browser.ignore.https.errors=true

# Accept downloads automatically
browser.accept.downloads=true
browser.download.dir=target/downloads

# --------------------------------------------------------------
# Browser - Proxy
# --------------------------------------------------------------
browser.proxy.enabled=false
# Format: http://host:port  or  socks5://host:port
browser.proxy.server=
browser.proxy.username=
browser.proxy.password=
# Comma-separated hosts to bypass proxy
browser.proxy.bypass=localhost,127.0.0.1

# --------------------------------------------------------------
# Browser - Video Recording
# --------------------------------------------------------------
# ALL | FAILED | NONE
browser.video.capture.mode=NONE
browser.video.output.dir=target/videos
browser.video.width=1280
browser.video.height=720

# --------------------------------------------------------------
# Browser - Launch Args (Chromium only)
# --------------------------------------------------------------
# Comma-separated extra args passed to the browser process
# Example: --disable-gpu,--no-sandbox,--disable-dev-shm-usage
browser.launch.args=--disable-gpu,--no-sandbox,--disable-dev-shm-usage

# --------------------------------------------------------------
# Timeouts
# --------------------------------------------------------------
timeout=30000
page.load.timeout=90000

# --------------------------------------------------------------
# Trace Configuration
# --------------------------------------------------------------
trace.output.dir=target/traces
trace.name.pattern={scenario}_{timestamp}

# ALL | FAILED | NONE
trace.capture.mode=FAILED

trace.include.screenshots=true
trace.include.snapshots=true
trace.include.sources=true

# --------------------------------------------------------------
# Screenshot Configuration
# --------------------------------------------------------------
screenshot.output.dir=target/screenshots
screenshot.name.pattern={scenario}_{timestamp}

# ALL | FAILED | NONE
screenshot.capture.mode=FAILED

# ---------------------------------------------------------------
# Network Logging
# ---------------------------------------------------------------
network.logging.enabled=false

# ============================================================
# Demo Mode - highlights focused/clicked elements in browser
# Set to true during development or demo presentations
# ============================================================
demo.mode.enabled=false
